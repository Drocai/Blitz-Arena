<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blitz Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    .landing {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .landing-title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #FF69B4, #FFD700, #8B00FF, #50C878);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
    }

    .landing-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-top: -24px;
    }

    .mode-cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
      max-width: 700px;
    }

    .mode-card {
      width: 280px;
      padding: 32px 24px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .mode-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .mode-card.valentine {
      border-color: rgba(255,105,180,0.3);
    }
    .mode-card.valentine:hover {
      border-color: rgba(255,105,180,0.6);
      box-shadow: 0 8px 30px rgba(255,105,180,0.15);
    }

    .mode-card.easter {
      border-color: rgba(80,200,120,0.3);
    }
    .mode-card.easter:hover {
      border-color: rgba(80,200,120,0.6);
      box-shadow: 0 8px 30px rgba(80,200,120,0.15);
    }

    .mode-icon {
      font-size: 48px;
      line-height: 1;
    }

    .mode-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .mode-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.5;
    }

    .mode-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mode-card.valentine .mode-tag {
      background: rgba(255,105,180,0.15);
      color: #FF69B4;
    }

    .mode-card.easter .mode-tag {
      background: rgba(80,200,120,0.15);
      color: #50C878;
    }

    .landing-footer {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }

    @media (max-width: 640px) {
      .landing-title { font-size: 36px; }
      .mode-cards { flex-direction: column; align-items: center; }
      .mode-card { width: 260px; padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1 class="landing-title">BLITZ ARENA</h1>
    <p class="landing-sub">Choose your battle</p>

    <div class="mode-cards">
      <a class="mode-card valentine" href="/valentine.html">
        <div class="mode-icon">&#x2764;</div>
        <div class="mode-name">Valentine's Showdown</div>
        <div class="mode-desc">1v1 multiplayer arena battle. Challenge a friend — first to 10 hits wins.</div>
        <div class="mode-tag">2 Player</div>
      </a>

      <a class="mode-card easter" href="/easter.html">
        <div class="mode-icon">&#x1F95A;</div>
        <div class="mode-name">Easter Egg Hunt</div>
        <div class="mode-desc">Solo arcade waves. Smash enemies, chain combos, fight bosses, unlock rewards.</div>
        <div class="mode-tag">Solo Arcade</div>
      </a>
    </div>

    <p class="landing-footer">Blitz Arena v1.0</p>
  </div>
</body>
</html>
